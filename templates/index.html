<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OllaNews</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <button id="bookmarkTrigger" class="pressable" onclick="openArchive()" title="View Saved Summaries">🔖</button>

    <div id="archiveView" class="modal-view">
        <div class="modal-content">
            <button class="pressable close-btn" onclick="closeArchive()">CLOSE [X]</button>
            <h1 style="font-size: 2rem; border-bottom: 4px solid var(--ink); margin-bottom: 30px;">THE ARCHIVE</h1>
            <div id="archiveList">
                <p>No dispatches saved yet.</p>
            </div>
        </div>
    </div>

    <div id="readerView" class="modal-view">
        <div class="modal-content">
            <button class="pressable close-btn" onclick="closeReader()">CLOSE [X]</button>
            <h1 id="readerTitle" style="font-size: 2.5rem; border: none;">Headline</h1>

            <div id="aiContainer" class="ai-section">
                <div style="display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; align-items: center; margin-bottom: 20px;">
                    <button id="sumBtn" class="pressable" onclick="triggerAI()" style="padding: 15px 30px; font-weight: bold;">SUMMARIZE WITH AI</button>
                    <button id="saveBtn" class="pressable" onclick="saveArticle()" style="padding: 15px 30px; font-weight: bold;">[SAVE TO ARCHIVE]</button>
                </div>
                <div id="aiOutput" style="display: none;">
                    <div id="aiStatus"><div class="spinner"></div><p>TYPEWRITER ENGAGED...</p></div>
                    <div class="summary-result">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                            <h4 style="text-transform:uppercase; margin:0;">The AI Breakdown</h4>
                        </div>
                        <div id="streamingText" class="streaming-text"></div>
                    </div>
                </div>
            </div>

            <div id="readerBody" class="raw-body">Content goes here...</div>
        </div>
    </div>

    <div id="landing" class="landing-view">
        <div class="landing-header">
            <div style="text-align: center;">
                <h1>OllaNews</h1>
                <div style="display: flex; justify-content: center; gap: 20px; margin-top: 10px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px;">
                    <span>Better News Feed | by Pranav Desai and Sadiyah Shaik</span>
                </div>
            </div>

            <input type="text" id="topicInput" class="newspaper-input pressable" placeholder="SEARCH TOPIC..." onkeydown="if(event.key === 'Enter') searchNews()">
        </div>

        <div id="results"></div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}" defer></script>
</body>
</html>
